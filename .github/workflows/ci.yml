name: C Build CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            compiler: gcc
            output: hello-linux
          - os: windows-latest
            name: windows
            output: hello.exe
          - os: macos-latest
            name: macos
            compiler: clang
            output: hello-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 for Windows build
        if: matrix.name == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Compile ${{ matrix.name }} binary
        if: matrix.name != 'windows'
        shell: bash
        run: |
          ${{ matrix.compiler || 'gcc' }} -O2 -Wall -Wextra -o "${{ matrix.output }}" hello.c

      - name: Compile Windows binary
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          x86_64-w64-mingw32-gcc -O2 -Wall -Wextra -o hello.exe hello.c

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ matrix.name }}
          path: ${{ matrix.output }}

  build-hiwifi2:
    name: Build for HiWiFi / 极路由2 (mt7620)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenWrt SDK (mt7620)
        run: |
          sudo apt-get update
          sudo apt-get install -y xz-utils

          wget -q https://downloads.openwrt.org/releases/23.05.3/targets/ramips/mt7620/openwrt-sdk-23.05.3-ramips-mt7620_gcc-12.3.0_musl.Linux-x86_64.tar.xz

          mkdir -p openwrt-sdk
          tar xf openwrt-sdk-*.tar.xz -C openwrt-sdk --strip-components=1

          TOOLCHAIN_DIR=$(find openwrt-sdk/staging_dir -name "toolchain-*" -type d | head -1)
          echo "$PWD/$TOOLCHAIN_DIR/bin" >> "$GITHUB_PATH"
          echo "STAGING_DIR=$PWD/openwrt-sdk/staging_dir" >> "$GITHUB_ENV"

      - name: Build (极路由2 - 静态链接)
        run: |
          mipsel-openwrt-linux-musl-gcc -O2 -Wall -Wextra -static -s -o hello-hiwifi2 hello.c

          file hello-hiwifi2
          ldd hello-hiwifi2 2>/dev/null || echo "Static binary confirmed"

          tar czvf hello-hiwifi2.tar.gz hello-hiwifi2

      - name: Upload HiWiFi artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-hiwifi2
          path: |
            hello-hiwifi2
            hello-hiwifi2.tar.gz

  release:
    name: Publish Release
    needs: [build-native, build-hiwifi2]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hello-linux/hello-linux
            dist/hello-windows/hello.exe
            dist/hello-macos/hello-macos
            dist/hello-hiwifi2/hello-hiwifi2
            dist/hello-hiwifi2/hello-hiwifi2.tar.gz
          generate_release_notes: true
