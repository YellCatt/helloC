name: C Build CI

on:
  push:
    tags:
      - 'v*'
  pull_request:

jobs:
  build-native:
    name: Build on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            compiler: gcc
            output: hello-linux
          - os: windows-latest
            name: windows
            output: hello.exe
          - os: macos-latest
            name: macos
            compiler: clang
            output: hello-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSYS2 for Windows build
        if: matrix.name == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Compile ${{ matrix.name }} binary
        if: matrix.name != 'windows'
        shell: bash
        run: |
          ${{ matrix.compiler || 'gcc' }} -O2 -Wall -Wextra -o ${{ matrix.output }} hello.c

      - name: Compile Windows binary
        if: matrix.name == 'windows'
        shell: msys2 {0}
        run: |
          x86_64-w64-mingw32-gcc -O2 -Wall -Wextra -o hello.exe hello.c

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ matrix.name }}
          path: ${{ matrix.output }}

  build-hiwifi2:
    name: Build for HiWiFi / 极路由2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install MIPS cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu binutils-mipsel-linux-gnu

      - name: Compile for HiWiFi / 极路由2
        run: |
          mipsel-linux-gnu-gcc -O2 -Wall -Wextra -o hello-hiwifi2 hello.c

      - name: Upload HiWiFi artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello-hiwifi2
          path: hello-hiwifi2

  release:
    name: Publish Release
    needs: [build-native, build-hiwifi2]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/hello-linux/hello-linux
            dist/hello-windows/hello.exe
            dist/hello-macos/hello-macos
            dist/hello-hiwifi2/hello-hiwifi2
          generate_release_notes: true
